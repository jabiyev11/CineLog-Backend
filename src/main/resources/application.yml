spring:
  application:
    name: CIneLog
  datasource:
    url: jdbc:postgresql://localhost:5432/cinelog
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  error:
    whitelabel:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
